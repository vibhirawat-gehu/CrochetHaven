<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Crochet Haven</title>
  <meta name="description" content="Get in touch with Crochet Haven.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .contact-container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 3rem;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--text-color);
    }
    
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: var(--transition);
    }
    
    .form-group input:focus, .form-group textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255, 209, 220, 0.3);
    }
    
    .about-text {
      text-align: center;
      margin-bottom: 2rem;
      color: #666;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo"><img src="images/logo.png" alt="Crochet Haven" class="logo-img"></a>
    <button class="hamburger" id="hamburger-btn" aria-label="Toggle navigation">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
    <div class="nav-links" id="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="contact.html" class="active">Contact</a>
      <a href="cart.html" class="cart-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-bottom: 3px; margin-right: 4px;"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg> Cart <span id="cart-badge" class="cart-count" style="display:none;">0</span>
      </a>
    </div>
  </nav>

  <section class="section" style="flex: 1;">
    <h2 class="section-title">Get in Touch</h2>
    
    <div class="contact-container">
      <div class="about-text">
        <p>Crochet Haven is a passion project born out of love for soft, handmade goods. We carefully handcraft every item to ensure maximum coziness and quality. Got a question? Send us a message!</p>
      </div>
      
      <form class="contact-form" onsubmit="event.preventDefault(); showToast('Message sent! We will get back to you soon.'); this.reset();">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" required placeholder="John Doe">
        </div>
        
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" required placeholder="john@example.com">
        </div>
        
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" rows="5" required placeholder="How can we help you?"></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
      </form>
    </div>
  </section>

  <footer>
    <p style="color: #bbb; font-size: 0.9rem;">&copy; 2026 Crochet Haven. All rights reserved.</p>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
