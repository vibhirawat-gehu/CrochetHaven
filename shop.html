<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | Crochet Haven</title>
  <meta name="description" content="Shop our full collection of handmade crochet items.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo"><img src="images/logo.png" alt="Crochet Haven" class="logo-img"></a>
    <button class="hamburger" id="hamburger-btn" aria-label="Toggle navigation">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
    <div class="nav-links" id="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html" class="active">Shop</a>
      <a href="contact.html">Contact</a>
      <a href="cart.html" class="cart-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-bottom: 3px; margin-right: 4px;"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg> Cart <span id="cart-badge" class="cart-count" style="display:none;">0</span>
      </a>
    </div>
  </nav>

  <section class="section" style="flex: 1;">
    <h2 class="section-title">Our Collection</h2>
    
    <div class="shop-controls">
      <div class="filters">
        <button class="filter-btn active" data-category="All">All</button>
        <button class="filter-btn" data-category="Flowers">Flowers</button>
        <button class="filter-btn" data-category="Plushies">Plushies</button>
        <button class="filter-btn" data-category="Bags">Bags</button>
        <button class="filter-btn" data-category="Keychains">Keychains</button>
      </div>

      <div class="search-bar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="search-input" placeholder="Search products...">
      </div>
    </div>

    <div class="product-grid" id="shop-grid"></div>
  </section>

  <footer>
    <p style="color: #bbb; font-size: 0.9rem;">&copy; 2026 Crochet Haven. All rights reserved.</p>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
